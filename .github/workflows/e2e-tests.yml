name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  RUST_LOG: info
  BACKEND_PORT: 5002
  FRONTEND_PORT: 3001

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configure git for submodules
      run: |
        git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"
        git submodule update --init --recursive

    # -----------------------------------------------------------------
    # Runtime setup
    # -----------------------------------------------------------------
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: |
          apps/client/package-lock.json
          apps/e2e/package-lock.json

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/server

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev libpq-dev

    # -----------------------------------------------------------------
    # Build frontend
    # -----------------------------------------------------------------
    - name: Install frontend dependencies
      working-directory: apps/client
      run: npm ci

    - name: Build frontend
      working-directory: apps/client
      run: npm run build

    # -----------------------------------------------------------------
    # Build backend
    # -----------------------------------------------------------------
    - name: Build backend
      working-directory: apps/server
      run: cargo build

    # -----------------------------------------------------------------
    # Install E2E testing dependencies
    # -----------------------------------------------------------------
    - name: Install E2E test dependencies
      working-directory: apps/e2e
      run: npm ci

    - name: Install Playwright browsers
      working-directory: apps/e2e
      run: npx playwright install --with-deps chromium

    # -----------------------------------------------------------------
    # Create test environment
    # -----------------------------------------------------------------
    - name: Create E2E test .env.test
      working-directory: apps/e2e
      run: |
        cat > .env.test << EOF
        BASE_URL=http://localhost:${{ env.FRONTEND_PORT }}
        API_URL=http://localhost:${{ env.BACKEND_PORT }}
        TEST_USER_PASSWORD=TestPassword123!
        SKIP_CLEANUP=false
        CI=true
        EOF

    # -----------------------------------------------------------------
    # Start services
    # -----------------------------------------------------------------
    - name: Start backend
      working-directory: apps/server
      run: cargo run --bin server &
      env:
        DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
        JWT_SECRET: ${{ secrets.TEST_JWT_SECRET }}
        BACKEND_PORT: ${{ env.BACKEND_PORT }}

    - name: Start frontend preview
      working-directory: apps/client
      run: npx vite preview --port ${{ env.FRONTEND_PORT }} &

    - name: Wait for services
      run: |
        echo "Waiting for backend..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:${{ env.BACKEND_PORT }}/health > /dev/null 2>&1; then
            echo "✓ Backend is healthy (attempt $i)"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "✗ Backend failed to start"
            exit 1
          fi
          sleep 2
        done

        echo "Waiting for frontend..."
        for i in $(seq 1 20); do
          if curl -sf http://localhost:${{ env.FRONTEND_PORT }} > /dev/null 2>&1; then
            echo "✓ Frontend is reachable (attempt $i)"
            break
          fi
          if [ $i -eq 20 ]; then
            echo "✗ Frontend failed to start"
            exit 1
          fi
          sleep 2
        done

    # -----------------------------------------------------------------
    # Run E2E tests (chromium only in CI for speed)
    # -----------------------------------------------------------------
    - name: Run E2E tests
      working-directory: apps/e2e
      run: npx playwright test --project=chromium
      env:
        CI: true

    # -----------------------------------------------------------------
    # Upload artifacts
    # -----------------------------------------------------------------
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: apps/e2e/playwright-report/
        retention-days: 14

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: apps/e2e/test-results/
        retention-days: 7

    # -----------------------------------------------------------------
    # Summary
    # -----------------------------------------------------------------
    - name: Job summary
      if: always()
      run: |
        echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "### Environment" >> $GITHUB_STEP_SUMMARY
        echo "- Node version: $(node -v)" >> $GITHUB_STEP_SUMMARY
        echo "- Rust version: $(rustc --version)" >> $GITHUB_STEP_SUMMARY
        echo "- Runner: ${{ runner.os }}" >> $GITHUB_STEP_SUMMARY
        echo "### Tests" >> $GITHUB_STEP_SUMMARY
        echo "- Browser: Chromium" >> $GITHUB_STEP_SUMMARY
        echo "- Workflow triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- Commit SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
